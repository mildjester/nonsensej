		<h1 class="post-title">Chromeの開発者ツールを新タブでも維持する</h1>
		<div class="post-info">
				<p class="publish-date">投稿日：<time datetime="2018-11-19 10:29:41 &#43;0000 UTC" class="catalogue-time">2018-11-19</time></p>
			
				<div class="tags_list">
					 <div class="tags_item"><a href="https://blog2.logical-dice.comtags/chrome/">Chrome</a></div>
				</div>
			
		</div>
		<hr />
		<p>Chromeの開発者ツールはデフォルトでは新タブには反映されないのですが<br>
スマホモードでページの確認をしている時などは新タブもスマホモードのまま開きたい事が多いです。</p>
<p>以下の設定をすれば新タブも開発者ツールを維持したまま開く事ができます。</p>
<p>①開発者ツールの<code>settings</code>をクリックする。<br>
<img src="https://blog2.logical-dice.comimages/2018/11/chrome-devtool001.png" alt="" /></p>
<p>②下の方にスクロールしていき、<code>Auto-open DevTools for popups</code>にチェックを入れる。<br>
<img src="https://blog2.logical-dice.comimages/2018/11/chrome-devtool002.png" alt="" /></p>
<p>これだけです。</p>
