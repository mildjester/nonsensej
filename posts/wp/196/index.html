		<h1 class="post-title">【Ubuntu】InkscapeでPDFを開くとズレてしまう場合</h1>
		<div class="post-info">
				<p class="publish-date">投稿日：<time datetime="2016-02-04 12:37:03 &#43;0000 UTC" class="catalogue-time">2016-02-04</time></p>
			
				<div class="tags_list">
					 <div class="tags_item"><a href="/tags/ubuntu/">ubuntu</a></div>
				</div>
			
		</div>
		<hr />
		<p>知っている人にとっては当たり前の話かもしれませんが<br>
InkscapeでPDFを編集しようと開くと、一部文字がズレてしまう事象に困っていました。</p>
<p>対応方法はInkscapeで開く際に出てくるポップアップで<br>
「import via Poppler」にチェックを入れてから「OK」をクリックだけです。</p>
<p>今まではポップアップは何も触らず「OK」をクリックしてました。<br>
ちゃんと操作方法は調べなければいけないと思いました。</p>
